server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/html text/plain;
    gzip_min_length 256;

    # MIME override for .jsx (Babel standalone lo lee como texto igual, pero ayuda)
    types {
        text/html                       html;
        text/css                        css;
        application/javascript          js jsx;
        application/json                json;
        image/svg+xml                   svg;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # data.json puede cachearse mas agresivamente
    location = /data.json {
        add_header Cache-Control "public, max-age=3600";
    }
}
